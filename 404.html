<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seite nicht gefunden — AOF</title>
<meta name="theme-color" content="#0E1220" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Space Grotesk',sans-serif;
  background:#0E1220;
  color:#FFFFFF;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:40px;
  overflow:hidden;position:relative;
}
body::before{
  content:"";position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(circle at 80% 20%, rgba(232,80,168,.2) 0%, transparent 50%),
    radial-gradient(circle at 20% 80%, rgba(155,77,255,.2) 0%, transparent 50%);
  filter:blur(80px);
}
.inner{position:relative;z-index:1;max-width:600px}
.code{
  font-family:'JetBrains Mono',monospace;
  font-size:14px;letter-spacing:.3em;color:rgba(255,255,255,.55);
  margin-bottom:32px;text-transform:uppercase;
}
h1{
  font-size:clamp(48px,7vw,88px);
  font-weight:500;letter-spacing:-.03em;line-height:1.1;
  margin-bottom:24px;
}
.grad{
  background:linear-gradient(90deg,#FFC73C 0%,#FF5E7A 45%,#E850A8 65%,#9B4DFF 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
p{
  font-size:19px;line-height:1.6;color:rgba(255,255,255,.88);
  margin-bottom:40px;
}
a.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 28px;font-size:15px;font-weight:600;
  background:linear-gradient(90deg,#FFC73C,#FF5E7A,#E850A8,#9B4DFF);
  color:#000;text-decoration:none;border-radius:100px;
  transition:transform .25s ease;
}
a.btn:hover{transform:translateY(-2px)}
a.btn svg{width:14px;height:14px}
</style>
</head>
<body>
<div class="inner">
  <div class="code">Error 404</div>
  <h1>Diese Seite existiert<br><span class="grad">leider nicht</span>.</h1>
  <p>Die angeforderte Seite konnte nicht gefunden werden. Möglicherweise wurde sie verschoben oder entfernt.</p>
  <a class="btn" href="/">
    Zurück zur Startseite
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
  </a>
</div>
</body>
</html>
